<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="theme-color" content="#1e2327">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ .Site.Params.description }}">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/img/banner-dark.svg">
    {{/* Mark the document JS-capable before first paint, so the reveal
         hide-state in site.css applies only when JS can undo it: no FOUC,
         and a no-JS visitor still sees the full page. */}}
    <script>document.documentElement.className = "js";</script>
    <link rel="stylesheet" href="/css/site.css">
  </head>
  <body>
    <div class="ox-atmos" aria-hidden="true"><div class="ox-atmos__grain"></div></div>
    <div class="ox-scrollbar" id="ox-scrollbar" aria-hidden="true"></div>
    {{ partial "nav.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    <script src="/js/copy.js" defer></script>
    <script src="/js/reveal.js" defer></script>
  </body>
</html>
