<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img"
     aria-label="Otherix architecture: control plane with embedded etcd, agents driving QEMU, peer-to-peer migration"
     fill="none" stroke="currentColor" color="#4f46e5" font-family="system-ui, sans-serif">
  <style>
    text { fill: currentColor; stroke: none; font-size: 14px; }
    .title { font-size: 15px; font-weight: 600; }
    .muted { opacity: .7; font-size: 12px; }
    rect { rx: 10; }
  </style>
  <rect x="230" y="20" width="300" height="80" stroke-width="2"/>
  <text class="title" x="250" y="50">Control plane (api-server)</text>
  <text class="muted" x="250" y="72">embedded etcd - desired state, reconcilers</text>
  <line x1="330" y1="100" x2="150" y2="200" stroke-width="1.5"/>
  <line x1="430" y1="100" x2="610" y2="200" stroke-width="1.5"/>
  <text class="muted" x="180" y="150">mTLS heartbeat</text>
  <text class="muted" x="470" y="150">mTLS heartbeat</text>
  <rect x="40" y="200" width="220" height="70" stroke-width="2"/>
  <text class="title" x="60" y="230">Agent (node A)</text>
  <text class="muted" x="60" y="252">talks to QEMU directly, no libvirt</text>
  <rect x="500" y="200" width="220" height="70" stroke-width="2"/>
  <text class="title" x="520" y="230">Agent (node B)</text>
  <text class="muted" x="520" y="252">talks to QEMU directly, no libvirt</text>
  <line x1="260" y1="235" x2="500" y2="235" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text class="muted" x="320" y="226">peer-to-peer live migration</text>
  <rect x="55" y="320" width="80" height="60" stroke-width="1.5"/>
  <text x="80" y="355">VM</text>
  <rect x="165" y="320" width="80" height="60" stroke-width="1.5"/>
  <text x="190" y="355">VM</text>
  <line x1="150" y1="270" x2="150" y2="320" stroke-width="1.2"/>
  <rect x="515" y="320" width="80" height="60" stroke-width="1.5"/>
  <text x="540" y="355">VM</text>
  <rect x="625" y="320" width="80" height="60" stroke-width="1.5"/>
  <text x="650" y="355">VM</text>
  <line x1="610" y1="270" x2="610" y2="320" stroke-width="1.2"/>
</svg>
